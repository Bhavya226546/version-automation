apiVersion: apps/v1
kind: Deployment
metadata:
  name: version-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: version-app
  template:
    metadata:
      labels:
        app: version-app
    spec:
      containers:
      - name: version-app
        image: bhavya226546/version-automation:latest
        ports:
        - containerPort: 5000